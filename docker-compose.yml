services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: birdai
      POSTGRES_PASSWORD: birdai
      POSTGRES_DB: birdai
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U birdai -d birdai"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://birdai:birdai@db:5432/birdai
      PORT: "3100"
      SERVE_UI: "true"
      BIRDAI_DEPLOYMENT_MODE: "authenticated"
      BIRDAI_DEPLOYMENT_EXPOSURE: "private"
      BIRDAI_PUBLIC_URL: "${BIRDAI_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - birdai-data:/birdai
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  birdai-data:
