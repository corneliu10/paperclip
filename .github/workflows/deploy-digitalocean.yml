name: Deploy DigitalOcean

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-digitalocean-master
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Run tests
        run: pnpm test:run

      - name: Build
        run: pnpm build

  deploy:
    needs: verify
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_PRIVATE_KEY != '' && secrets.DEPLOY_SSH_KNOWN_HOSTS != '' && secrets.DEPLOY_APP_DIR != '' && secrets.DEPLOY_BETTER_AUTH_SECRET != '' && secrets.DEPLOY_BIRDAI_PUBLIC_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Configure known hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Render deployment env file
        env:
          DEPLOY_DATABASE_URL: ${{ secrets.DEPLOY_DATABASE_URL }}
          DEPLOY_BETTER_AUTH_SECRET: ${{ secrets.DEPLOY_BETTER_AUTH_SECRET }}
          DEPLOY_BIRDAI_PUBLIC_URL: ${{ secrets.DEPLOY_BIRDAI_PUBLIC_URL }}
          DEPLOY_BIRDAI_DOMAIN: ${{ secrets.DEPLOY_BIRDAI_DOMAIN }}
          DEPLOY_ACME_EMAIL: ${{ secrets.DEPLOY_ACME_EMAIL }}
          DEPLOY_OPENAI_API_KEY: ${{ secrets.DEPLOY_OPENAI_API_KEY }}
          DEPLOY_ANTHROPIC_API_KEY: ${{ secrets.DEPLOY_ANTHROPIC_API_KEY }}
          DEPLOY_BIRDAI_PORT: ${{ secrets.DEPLOY_BIRDAI_PORT }}
          DEPLOY_DATA_DIR: ${{ secrets.DEPLOY_DATA_DIR }}
          DEPLOY_VALIDATION_DB_USER: ${{ secrets.DEPLOY_VALIDATION_DB_USER }}
          DEPLOY_VALIDATION_DB_PASSWORD: ${{ secrets.DEPLOY_VALIDATION_DB_PASSWORD }}
          DEPLOY_VALIDATION_DB_NAME: ${{ secrets.DEPLOY_VALIDATION_DB_NAME }}
          DEPLOY_VALIDATION_DB_DATA_DIR: ${{ secrets.DEPLOY_VALIDATION_DB_DATA_DIR }}
          DEPLOY_CADDY_DATA_DIR: ${{ secrets.DEPLOY_CADDY_DATA_DIR }}
          DEPLOY_CADDY_CONFIG_DIR: ${{ secrets.DEPLOY_CADDY_CONFIG_DIR }}
          DEPLOY_EXPOSURE: ${{ secrets.DEPLOY_EXPOSURE }}
        run: |
          cat > .env.production <<EOF
          DATABASE_URL=${DEPLOY_DATABASE_URL}
          BETTER_AUTH_SECRET=${DEPLOY_BETTER_AUTH_SECRET}
          BIRDAI_PUBLIC_URL=${DEPLOY_BIRDAI_PUBLIC_URL}
          BIRDAI_DEPLOYMENT_MODE=authenticated
          BIRDAI_DEPLOYMENT_EXPOSURE=${DEPLOY_EXPOSURE:-public}
          HOST=0.0.0.0
          PORT=3100
          BIRDAI_INSTANCE_ID=default
          BIRDAI_CONFIG=/birdai/instances/default/config.json
          BIRDAI_PORT=${DEPLOY_BIRDAI_PORT:-3100}
          BIRDAI_DATA_DIR=${DEPLOY_DATA_DIR:-./data/digitalocean-birdai}
          VALIDATION_DB_USER=${DEPLOY_VALIDATION_DB_USER:-birdai}
          VALIDATION_DB_PASSWORD=${DEPLOY_VALIDATION_DB_PASSWORD:-birdai}
          VALIDATION_DB_NAME=${DEPLOY_VALIDATION_DB_NAME:-birdai}
          VALIDATION_DB_DATA_DIR=${DEPLOY_VALIDATION_DB_DATA_DIR:-./data/digitalocean-postgres}
          OPENAI_API_KEY=${DEPLOY_OPENAI_API_KEY}
          ANTHROPIC_API_KEY=${DEPLOY_ANTHROPIC_API_KEY}
          BIRDAI_DOMAIN=${DEPLOY_BIRDAI_DOMAIN}
          ACME_EMAIL=${DEPLOY_ACME_EMAIL}
          CADDY_HTTP_PORT=80
          CADDY_HTTPS_PORT=443
          BIRDAI_CADDY_DATA_DIR=${DEPLOY_CADDY_DATA_DIR:-./data/caddy-data}
          BIRDAI_CADDY_CONFIG_DIR=${DEPLOY_CADDY_CONFIG_DIR:-./data/caddy-config}
          EOF

      - name: Upload deployment env file
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
        run: |
          scp .env.production "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_APP_DIR}/.env.production"

      - name: Deploy on Droplet
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_COMPOSE_FILES: ${{ secrets.DEPLOY_COMPOSE_FILES }}
        run: |
          compose_files="${DEPLOY_COMPOSE_FILES:-docker-compose.prod.yml:docker-compose.validation.yml}"
          compose_args=""
          OLD_IFS="$IFS"
          IFS=':'
          read -r -a compose_parts <<< "$compose_files"
          IFS="$OLD_IFS"

          for file in "${compose_parts[@]}"; do
            compose_args="$compose_args -f $file"
          done

          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "set -euo pipefail; cd '${DEPLOY_APP_DIR}'; if [ ! -d .git ]; then echo 'Expected a git clone at ${DEPLOY_APP_DIR}.' >&2; exit 1; fi; git fetch origin; git checkout master; git reset --hard origin/master; docker compose --env-file .env.production ${compose_args} up -d --build"
