services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - birdai
    env_file:
      - .env.production
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - "${BIRDAI_CADDY_DATA_DIR:-./data/caddy-data}:/data"
      - "${BIRDAI_CADDY_CONFIG_DIR:-./data/caddy-config}:/config"
