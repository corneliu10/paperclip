services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${VALIDATION_DB_USER:-birdai}"
      POSTGRES_PASSWORD: "${VALIDATION_DB_PASSWORD:-birdai}"
      POSTGRES_DB: "${VALIDATION_DB_NAME:-birdai}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${VALIDATION_DB_USER:-birdai} -d ${VALIDATION_DB_NAME:-birdai}",
        ]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - "${VALIDATION_DB_DATA_DIR:-./data/digitalocean-postgres}:/var/lib/postgresql/data"

  birdai:
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgres://${VALIDATION_DB_USER:-birdai}:${VALIDATION_DB_PASSWORD:-birdai}@db:5432/${VALIDATION_DB_NAME:-birdai}}"
    ports:
      - "${BIRDAI_PORT:-3100}:3100"
